server:
  port: 9000

spring:
  application:
    name: account-service

  # MySQL Database Configuration - Docker service
  datasource:
    url: jdbc:mysql://mysql:3306/ecommerce_accounts?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

# Eureka Configuration - Docker service
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    hostname: account-service
    instance-id: ${spring.application.name}:${server.port}
    prefer-ip-address: true

# OAuth2 and Security Configuration
security:
  oauth2:
    client:
      registration:
        google:
          client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
          client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
          scope: openid,profile,email
        github:
          client-id: ${GITHUB_CLIENT_ID:your-github-client-id}
          client-secret: ${GITHUB_CLIENT_SECRET:your-github-client-secret}
          scope: user:email,read:user
      provider:
        google:
          authorization-uri: https://accounts.google.com/o/oauth2/auth
          token-uri: https://oauth2.googleapis.com/token
          user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
          user-name-attribute: sub

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:mySecretKey}
  expiration: 86400000 # 24 hours in milliseconds
  refresh-expiration: 604800000 # 7 days in milliseconds

# CORS Configuration
cors:
  allowed-origins:
    - http://localhost:3000
    - http://localhost:8080
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allowed-headers:
    - "*"
  allow-credentials: true

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    com.yourcompany.accountservice: DEBUG
    org.springframework.web: DEBUG