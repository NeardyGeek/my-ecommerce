version: '3.8'
services:
  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: account_db
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword" ]
      interval: 10s
      timeout: 5s
      retries: 10



  mongodb:
    image: mongo:5.0
    ports:
      - "27017:27017"

  cassandra:
    image: cassandra:3.11
    ports:
      - "9042:9042"

  kafka:
    image: confluentinc/cp-kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181



  # Add these services to your existing docker-compose.yml

  eureka-server:
    build: ./eurekaserver
    ports:
      - "8761:8761"

  account-service:
    build: ./accountservice
    ports:
      - "9000:9000"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JWT_SECRET=${JWT_SECRET:-myVeryLongSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm}
    restart: on-failure
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9000/actuator/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s


  api-gateway:
    build: ./apigateway
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server

  item-service:
    build: ./itemservice
    ports:
      - "8081:8081"
    depends_on:
      - mongodb
      - eureka-server

